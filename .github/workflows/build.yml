update-gitops:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: cessda/cessda-dashboard-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      - name: Update image tag
        run: |
          cd gitops
          sed -i "s|image: ghcr.io/cessda/cessda.dashboard.kpi:.*|image: ghcr.io/cessda/cessda.dashboard.kpi:sha-${GITHUB_SHA::7}|" deployment.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployment.yaml
          git diff --staged --quiet || git commit -m "chore: bump image to sha-${GITHUB_SHA::7}"
          git push
